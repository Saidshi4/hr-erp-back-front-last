server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hic_central}
    username: ${SPRING_DATASOURCE_USERNAME:hic_user}
    password: ${SPRING_DATASOURCE_PASSWORD:hic_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:HicCentralJwtSecretKey2024AzerbaijanHRERPSystemSecretKeyMustBe64CharsLong!!}
  expiration: 86400000
  refresh-expiration: 604800000

hikvision:
  default-port: 80
  default-username: admin
  connection-timeout: 5000
  read-timeout: 10000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

encryption:
  secret-key: ${ENCRYPTION_SECRET_KEY:HicEncryptKey32CharactersLongKey!}

rate-limit:
  max-requests-per-minute: ${RATE_LIMIT_MAX:60}
  login-max-per-minute: ${RATE_LIMIT_LOGIN_MAX:10}

logging:
  level:
    root: INFO
    com.hic: INFO
