server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/hic_central
    username: hic_user
    password: hic_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: HicCentralJwtSecretKey2024AzerbaijanHRERPSystemSecretKey
  expiration: 86400000
  refresh-expiration: 604800000

hikvision:
  default-port: 80
  default-username: admin
  connection-timeout: 5000
  read-timeout: 10000

logging:
  level:
    root: INFO
    com.hic: INFO
