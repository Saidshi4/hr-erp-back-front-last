version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hic_postgres
    environment:
      POSTGRES_DB: hic_central
      POSTGRES_USER: hic_user
      POSTGRES_PASSWORD: hic_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hic_user -d hic_central"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hic_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pgadmin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-O", "-", "http://localhost:80/misc/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256m

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hic_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hic_central
      SPRING_DATASOURCE_USERNAME: hic_user
      SPRING_DATASOURCE_PASSWORD: hic_password
      JWT_SECRET: ${JWT_SECRET:-HicCentralJwtSecretKey2024AzerbaijanHRERPSystemSecretKeyMustBe64CharsLong!!}
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      ISAPI_BASE_URL: http://192.168.0.198:8081
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
#      isapi:
#        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512m

#  isapi:
#    build:
#      context: ./isapi
#      dockerfile: Dockerfile
#    container_name: hic_isapi
#    environment:
#      DB_URL: jdbc:postgresql://postgres:5432/hic_isapi
#      DB_USERNAME: hic_user
#      DB_PASSWORD: hic_password
#      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
#    ports:
#      - "8081:8081"
#    depends_on:
#      postgres:
#        condition: service_healthy
#    deploy:
#      resources:
#        limits:
#          memory: 512m

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hic_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  postgres_data:
