version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hic_postgres
    environment:
      POSTGRES_DB: hic_central
      POSTGRES_USER: hic_user
      POSTGRES_PASSWORD: hic_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hic_user -d hic_central"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hic_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pgadmin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hic_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hic_central
      SPRING_DATASOURCE_USERNAME: hic_user
      SPRING_DATASOURCE_PASSWORD: hic_password
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hic_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
