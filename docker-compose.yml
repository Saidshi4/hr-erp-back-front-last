services:
  postgres:
    image: postgres:15-alpine
    container_name: hic_postgres
    restart: always
    environment:
      POSTGRES_DB: hic_backend
      POSTGRES_USER: hic_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hic_user -d hic_backend"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hic_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@pgadmin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?Set PGADMIN_DEFAULT_PASSWORD in .env}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-O", "-", "http://localhost:80/misc/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256m

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hic_backend
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hic_backend
      SPRING_DATASOURCE_USERNAME: hic_user
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      ENCRYPTION_SECRET_KEY: ${ENCRYPTION_SECRET_KEY:?Set ENCRYPTION_SECRET_KEY in .env}
      ISAPI_API_KEY: ${ISAPI_API_KEY:?Set ISAPI_API_KEY in .env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      ISAPI_BASE_URL: http://isapi:8081
      COMPUTER_IP: ${COMPUTER_IP:-192.168.1.102}
      TZ: Asia/Baku
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      isapi:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512m

  isapi:
    build:
      context: ./isapi
      dockerfile: Dockerfile
    container_name: hic_isapi
    restart: always
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/hic_isapi
      DB_USERNAME: hic_user
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      ISAPI_API_KEY: ${ISAPI_API_KEY:?Set ISAPI_API_KEY in .env}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      TZ: Asia/Baku
    # Bind to localhost only — not publicly reachable in SaaS/prod deploys
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hic_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  postgres_data:
