spring.application.name=hr-erp-isapi

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/hic_central}
spring.datasource.username=${DB_USERNAME:hic_user}
spring.datasource.password=${DB_PASSWORD:hic_password}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

server.port=8081

isapi.alertStream.disconnectBackoffBaseSeconds=3
isapi.alertStream.deployExceedMaxBackoffSeconds=300

acs.history.major=${ACS_HISTORY_MAJOR:5}
acs.history.minor=${ACS_HISTORY_MINOR:75}
